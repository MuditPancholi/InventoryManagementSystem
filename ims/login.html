<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IMS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(13, 45, 71, 0.95), rgba(13, 45, 71, 0.95)),
                        url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding-top: 70px;
        }

        .login-container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: #4CAF50;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
        }

        .role-selection {
            margin-bottom: 2rem;
            text-align: center;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .role-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .role-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }

        .role-card.selected {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.2);
        }

        .role-card i {
            font-size: 2rem;
            color: #4CAF50;
            margin-bottom: 1rem;
        }

        .role-card h3 {
            color: white;
            margin: 0;
            font-size: 1.1rem;
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        #errorMessage {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: #ff3b3b;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-boxes"></i>
            <span>IMS</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-header">
            <h1>Welcome to IMS</h1>
            <p>Select your role to continue</p>
        </div>

        <div id="errorMessage"></div>

        <form id="loginForm">
            <div class="role-grid">
                <div class="role-card" onclick="selectRole('admin')">
                    <i class="fas fa-user-shield"></i>
                    <h3>Admin</h3>
                </div>
                <div class="role-card" onclick="selectRole('employee')">
                    <i class="fas fa-user-tie"></i>
                    <h3>Employee</h3>
                </div>
                <div class="role-card" onclick="selectRole('user')">
                    <i class="fas fa-user"></i>
                    <h3>User</h3>
                </div>
                <div class="role-card" onclick="selectRole('supplier')">
                    <i class="fas fa-truck"></i>
                    <h3>Supplier</h3>
                </div>
            </div>

            <button type="submit" class="login-btn">Continue</button>
        </form>
    </div>

    <script>
        let selectedRole = null;

        function selectRole(role) {
            selectedRole = role;
            // Remove selected class from all cards
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('selected');
            });
            // Add selected class to clicked card
            event.currentTarget.classList.add('selected');
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!selectedRole) {
                const errorMessage = document.getElementById('errorMessage');
                errorMessage.textContent = 'Please select a role';
                errorMessage.style.display = 'block';
                return;
            }

            // Create session
            const session = {
                userId: Date.now(),
                username: selectedRole,
                role: selectedRole,
                isApproved: true,
                lastLogin: new Date().toISOString()
            };

            // Store session before redirect
            localStorage.setItem('currentSession', JSON.stringify(session));
            console.log('Session created:', session);

            // Add a small delay before redirect
            setTimeout(() => {
                switch(selectedRole) {
                    case 'admin':
                        window.location.replace('admin-dashboard.html');
                        break;
                    case 'employee':
                        window.location.replace('employee-dashboard.html');
                        break;
                    case 'user':
                        window.location.replace('user-dashboard.html');
                        break;
                    case 'supplier':
                        window.location.replace('supplier-dashboard.html');
                        break;
                    default:
                        window.location.replace('index.html');
                }
            }, 100);
        });

        // Remove the automatic redirection on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Only check for session if coming from a dashboard
            const referrer = document.referrer;
            if (referrer.includes('dashboard')) {
                const session = JSON.parse(localStorage.getItem('currentSession'));
                if (session && session.role) {
                    const dashboards = {
                        admin: 'admin-dashboard.html',
                        employee: 'employee-dashboard.html',
                        user: 'user-dashboard.html',
                        supplier: 'supplier-dashboard.html'
                    };
                    window.location.replace(dashboards[session.role]);
                }
            }
        });
    </script>
</body>
</html>
