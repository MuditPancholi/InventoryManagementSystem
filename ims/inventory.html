<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - IMS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="initializeInventory()">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h3 id="userFullName"></h3>
                <p id="userRole"></p>
            </div>
            <nav id="roleBasedMenu" class="nav-menu">
                <!-- Menu will be populated by JavaScript -->
            </nav>
        </aside>
        
        <main class="dashboard-content">
            <header class="content-header">
                <h1>Inventory Management</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openAddItemModal()">
                        <i class="fas fa-plus"></i> Add New Item
                    </button>
                </div>
            </header>

            <!-- Search and Filter Section -->
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Search items..." class="search-input">
                <select id="categoryFilter" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="furniture">Furniture</option>
                    <option value="clothing">Clothing</option>
                </select>
                <select id="stockFilter" class="filter-select">
                    <option value="">All Stock Levels</option>
                    <option value="low">Low Stock</option>
                    <option value="out">Out of Stock</option>
                    <option value="available">In Stock</option>
                </select>
            </div>

            <!-- Inventory Grid -->
            <div class="inventory-grid" id="inventoryGrid">
                <!-- Items will be populated here -->
            </div>
        </main>
    </div>

    <!-- Simplified Add/Edit Item Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add New Item</h2>
            <form id="itemForm" onsubmit="handleItemSubmit(event)">
                <!-- Image Upload -->
                <div class="form-group">
                    <label>Item Image</label>
                    <div class="image-upload-container">
                        <img id="imagePreview" src="placeholder.png" alt="Item Preview">
                        <input type="file" id="itemImage" accept="image/*" onchange="handleFileUpload(event)">
                        <label for="itemImage" class="upload-button">
                            <i class="fas fa-upload"></i> Choose Image
                        </label>
                    </div>
                </div>

                <!-- Basic Item Details -->
                <div class="form-group">
                    <label for="itemName">Item Name</label>
                    <input type="text" id="itemName" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="itemQuantity">Quantity</label>
                        <input type="number" id="itemQuantity" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="itemPrice">Price ($)</label>
                        <input type="number" id="itemPrice" step="0.01" min="0" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Save Item</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentItemId = null;
        let itemImage = null;

        function initializeInventory() {
            const session = validateSession();
            if (!session) return;
            
            populateMenu(session.role);
            loadInventoryItems();
            setupEventListeners();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    itemImage = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function openAddItemModal() {
            currentItemId = null;
            document.getElementById('modalTitle').textContent = 'Add New Item';
            document.getElementById('itemForm').reset();
            document.getElementById('imagePreview').src = 'placeholder.png';
            itemImage = null;
            document.getElementById('itemModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('itemModal').style.display = 'none';
        }

        function handleItemSubmit(event) {
            event.preventDefault();
            
            const itemData = {
                id: currentItemId || Date.now(),
                name: document.getElementById('itemName').value,
                quantity: parseInt(document.getElementById('itemQuantity').value),
                price: parseFloat(document.getElementById('itemPrice').value),
                image: itemImage || 'placeholder.png',
                lastUpdated: new Date().toISOString()
            };

            // Get existing inventory
            const inventory = JSON.parse(localStorage.getItem('inventory')) || [];

            if (currentItemId) {
                // Update existing item
                const index = inventory.findIndex(item => item.id === currentItemId);
                if (index !== -1) {
                    inventory[index] = { ...inventory[index], ...itemData };
                }
            } else {
                // Add new item
                inventory.push(itemData);
            }

            // Save to localStorage
            localStorage.setItem('inventory', JSON.stringify(inventory));
            
            // Refresh inventory display
            loadInventoryItems();
            closeModal();
        }

        function loadInventoryItems() {
            const inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            const grid = document.getElementById('inventoryGrid');
            
            grid.innerHTML = inventory.map(item => `
                <div class="inventory-card">
                    <div class="item-image">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <p class="category">${item.category}</p>
                        <p class="quantity">Quantity: ${item.quantity}</p>
                        <p class="price">$${item.price.toFixed(2)}</p>
                        <div class="item-actions">
                            <button onclick="editItem(${item.id})" class="btn-icon">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteItem(${item.id})" class="btn-icon">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function editItem(id) {
            const inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            const item = inventory.find(item => item.id === id);
            if (!item) return;

            currentItemId = id;
            document.getElementById('modalTitle').textContent = 'Edit Item';
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemCategory').value = item.category;
            document.getElementById('itemLocation').value = item.location;
            document.getElementById('itemQuantity').value = item.quantity;
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('minStock').value = item.minStock;
            document.getElementById('reorderPoint').value = item.reorderPoint;
            document.getElementById('itemDescription').value = item.description;
            document.getElementById('imagePreview').src = item.image;
            itemImage = item.image;

            document.getElementById('itemModal').style.display = 'block';
        }

        function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            const inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            const updatedInventory = inventory.filter(item => item.id !== id);
            localStorage.setItem('inventory', JSON.stringify(updatedInventory));
            loadInventoryItems();
        }

        function setupEventListeners() {
            // Close modal when clicking outside
            window.onclick = function(event) {
                if (event.target === document.getElementById('itemModal')) {
                    closeModal();
                }
            };

            // Search functionality
            document.getElementById('searchInput').addEventListener('input', filterItems);
            document.getElementById('categoryFilter').addEventListener('change', filterItems);
            document.getElementById('stockFilter').addEventListener('change', filterItems);
        }

        function filterItems() {
            // Implementation for filtering items
            // Add your filtering logic here
        }
    </script>
</body>
</html>
