<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - IMS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="initializeProductManagement()">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h3 id="userFullName"></h3>
                <p id="userRole"></p>
            </div>
            <nav id="roleBasedMenu" class="nav-menu">
                <!-- Menu will be populated by JavaScript -->
            </nav>
        </aside>
        
        <main class="dashboard-content">
            <header class="content-header">
                <h1>Product Management</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openAddProductModal()" data-permission="manage_inventory">
                        <i class="fas fa-plus"></i> Add Product
                    </button>
                </div>
            </header>

            <!-- Product Grid View -->
            <div class="product-grid">
                <!-- Products will be populated here -->
            </div>

            <!-- Product Modal -->
            <div id="productModal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2 id="modalTitle">Add Product</h2>
                    <form id="productForm" onsubmit="handleProductSubmit(event)">
                        <div class="form-group">
                            <label for="productImage">Product Image</label>
                            <div class="image-upload-container">
                                <img id="imagePreview" src="placeholder.png" alt="Product Image">
                                <input type="file" id="productImage" accept="image/*" onchange="previewImage(event)">
                                <label for="productImage" class="upload-label">
                                    <i class="fas fa-camera"></i> Choose Image
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="productName">Product Name</label>
                            <input type="text" id="productName" required>
                        </div>
                        <div class="form-group">
                            <label for="productCategory">Category</label>
                            <select id="productCategory" required>
                                <option value="">Select Category</option>
                                <option value="electronics">Electronics</option>
                                <option value="furniture">Furniture</option>
                                <option value="clothing">Clothing</option>
                                <!-- Add more categories -->
                            </select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="productPrice">Price</label>
                                <input type="number" id="productPrice" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label for="productStock">Stock</label>
                                <input type="number" id="productStock" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="productDescription">Description</label>
                            <textarea id="productDescription" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Product</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        let currentProductId = null;

        function initializeProductManagement() {
            const session = validateSession();
            if (!session) return;

            populateMenu(session.role);
            loadProducts();
        }

        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const productGrid = document.querySelector('.product-grid');
            const session = validateSession();

            let filteredProducts = products;
            if (session.role === ROLES.SUPPLIER) {
                filteredProducts = products.filter(p => p.supplierId === session.userId);
            }

            productGrid.innerHTML = filteredProducts.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${product.image || 'placeholder.png'}" alt="${product.name}">
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="price">$${product.price}</p>
                        <p class="stock">Stock: ${product.stock}</p>
                        <div class="product-actions">
                            <button onclick="editProduct(${product.id})" class="btn-icon">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteProduct(${product.id})" class="btn-icon">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function openAddProductModal() {
            currentProductId = null;
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('imagePreview').src = 'placeholder.png';
            document.getElementById('productModal').style.display = 'block';
        }

        function editProduct(productId) {
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const product = products.find(p => p.id === productId);
            if (!product) return;

            currentProductId = productId;
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productStock').value = product.stock;
            document.getElementById('productDescription').value = product.description;
            document.getElementById('imagePreview').src = product.image || 'placeholder.png';
            document.getElementById('productModal').style.display = 'block';
        }

        function handleProductSubmit(event) {
            event.preventDefault();
            
            const session = validateSession();
            if (!session) return;

            const productData = {
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                price: parseFloat(document.getElementById('productPrice').value),
                stock: parseInt(document.getElementById('productStock').value),
                description: document.getElementById('productDescription').value,
                image: document.getElementById('imagePreview').src,
                supplierId: session.role === ROLES.SUPPLIER ? session.userId : null,
                lastUpdated: new Date().toISOString()
            };

            const products = JSON.parse(localStorage.getItem('products')) || [];

            if (currentProductId) {
                // Update existing product
                const index = products.findIndex(p => p.id === currentProductId);
                if (index !== -1) {
                    products[index] = { ...products[index], ...productData };
                }
            } else {
                // Add new product
                products.push({
                    id: Date.now(),
                    ...productData,
                    createdAt: new Date().toISOString()
                });
            }

            localStorage.setItem('products', JSON.stringify(products));
            document.getElementById('productModal').style.display = 'none';
            loadProducts();
        }

        function deleteProduct(productId) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            const products = JSON.parse(localStorage.getItem('products')) || [];
            const updatedProducts = products.filter(p => p.id !== productId);
            localStorage.setItem('products', JSON.stringify(updatedProducts));
            loadProducts();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
