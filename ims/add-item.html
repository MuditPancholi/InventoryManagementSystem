<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Item - IMS</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Custom styles for add item page */
        body {
            background: linear-gradient(135deg, #1a237e, #0d47a1, #01579b);
            background-size: 600% 600%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content-wrapper {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .content-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .content-header h1 {
            color: #ffffff;
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .back-button {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) translateX(-5px);
        }

        /* Image Upload Styles */
        .image-upload-container {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .image-upload-container:hover {
            border-color: #4CAF50;
            background: rgba(255, 255, 255, 0.1);
        }

        .image-preview-wrapper {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .image-preview-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: all 0.3s ease;
        }

        .upload-button-custom {
            background: #4CAF50;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-size: 1.1em;
            border: none;
        }

        .upload-button-custom:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .upload-button-custom i {
            font-size: 1.5em;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            color: #ffffff;
            display: block;
            margin-bottom: 8px;
            font-size: 1.1em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4CAF50;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        }

        /* Update Form Styles */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            color: #ffffff;
            display: block;
            margin-bottom: 8px;
            font-size: 1.1em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        /* Add specific styles for select options */
        .form-group select option {
            background: #1a237e;  /* Dark blue background */
            color: white;
            padding: 12px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4CAF50;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        /* Add styles for form row */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Add placeholder color */
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Style select when opened */
        .form-group select:focus option:checked {
            background: #4CAF50;
        }
    </style>

<body>
    <div class="content-wrapper">
        <header class="content-header">
            <button onclick="window.location.href='admin-dashboard.html'" class="back-button">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <h1>Add New Item</h1>
        </header>

        <form id="addItemForm" onsubmit="handleItemSubmit(event)">
            <div class="form-group">
                <div class="image-upload-container">
                    <div class="image-preview-wrapper">
                        <img id="imagePreview" alt="Item Preview">
                    </div>
                    <label for="itemImage" class="upload-button-custom">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>Choose Image</span>
                        <input type="file" id="itemImage" accept="image/*" onchange="handleFileUpload(event)" hidden>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="itemCategory">Category</label>
                    <select id="itemCategory" required>
                        <option value="">Select Category</option>
                        <option value="electronics">Electronics</option>
                        <option value="furniture">Furniture</option>
                        <option value="clothing">Clothing</option>
                        <option value="others">Others</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="itemQuantity">Quantity</label>
                    <input type="number" id="itemQuantity" min="0" required>
                </div>
            </div>

            <div class="form-group">
                <label for="itemPrice">Price ($)</label>
                <input type="number" id="itemPrice" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label for="itemDescription">Description</label>
                <textarea id="itemDescription" rows="4"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Item
                </button>
                <button type="button" onclick="window.location.href='admin-dashboard.html'" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </button>
            </div>
        </form>
    </div>

    <script>
        let itemImage = null; // Variable to store the image data

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const fileName = document.getElementById('selectedFileName');
            const imagePreview = document.getElementById('imagePreview');
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    itemImage = e.target.result; // Store the image data
                };
                reader.readAsDataURL(file);
            }
        }

        function handleItemSubmit(event) {
            event.preventDefault();
            
            const itemData = {
                id: Date.now(),
                name: document.getElementById('itemName').value,
                category: document.getElementById('itemCategory').value,
                quantity: parseInt(document.getElementById('itemQuantity').value),
                price: parseFloat(document.getElementById('itemPrice').value),
                description: document.getElementById('itemDescription').value,
                image: itemImage || 'placeholder.png', // Use the stored image data
                lastUpdated: new Date().toISOString()
            };

            // Get existing inventory
            let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            
            // Add new item
            inventory.push(itemData);
            
            // Save to localStorage
            localStorage.setItem('inventory', JSON.stringify(inventory));
            
            // Show success message
            alert('Item added successfully!');
            
            // Redirect back to dashboard
            window.location.href = 'admin-dashboard.html';
        }

        // Initialize image preview with placeholder
        document.addEventListener('DOMContentLoaded', function() {
            const imagePreview = document.getElementById('imagePreview');
            if (imagePreview) {
                imagePreview.src = 'https://cdn-icons-png.flaticon.com/512/1837/1837526.png';
            }
        });
    </script>
</body>
