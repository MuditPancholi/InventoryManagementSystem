<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard - IMS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="initializeEmployeeDashboard()">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user-tie"></i>
                </div>
                <h3 id="userFullName"></h3>
                <p id="userRole">Employee</p>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#" class="active" onclick="showSection('dashboard')">
                        <i class="fas fa-home"></i> Dashboard</a>
                    </li>
                    <li><a href="#" onclick="showSection('inventory')">
                        <i class="fas fa-boxes"></i> Inventory</a>
                    </li>
                    <li><a href="#" onclick="showSection('transactions')">
                        <i class="fas fa-exchange-alt"></i> Transactions</a>
                    </li>
                    <li><a href="#" onclick="showSection('reports')">
                        <i class="fas fa-chart-bar"></i> Reports</a>
                    </li>
                    <li><a href="#" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout</a>
                    </li>
                </ul>
            </nav>
        </aside>
        
        <main class="dashboard-content">
            <!-- Dashboard Overview Section -->
            <section id="dashboard" class="content-section">
                <header class="content-header">
                    <h1>Welcome, <span id="userName">Employee</span>!</h1>
                    <div class="date-time">
                        <p id="currentDate"></p>
                        <p id="currentTime"></p>
                    </div>
                </header>

                <!-- Quick Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-box"></i>
                        <h3>Total Items</h3>
                        <p id="totalItems">0</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Low Stock Items</h3>
                        <p id="lowStockItems">0</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-exchange-alt"></i>
                        <h3>Today's Transactions</h3>
                        <p id="todayTransactions">0</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-tasks"></i>
                        <h3>Pending Tasks</h3>
                        <p id="pendingTasks">0</p>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="recent-activity">
                    <h2>Recent Activity</h2>
                    <div id="activityLog" class="activity-list">
                        <!-- Activity logs will be populated here -->
                    </div>
                </div>
            </section>

            <!-- Inventory Section -->
            <section id="inventory" class="content-section" style="display: none;">
                <header class="content-header">
                    <h1>Inventory Management</h1>
                    <div class="header-actions">
                        <button onclick="openAddItemModal()" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Add New Item
                        </button>
                    </div>
                </header>

                <!-- Search and Filter -->
                <div class="search-filters">
                    <input type="text" id="searchInput" placeholder="Search items..." class="search-input">
                    <select id="categoryFilter" class="filter-select">
                        <option value="">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="furniture">Furniture</option>
                    </select>
                    <select id="stockFilter" class="filter-select">
                        <option value="">All Stock Levels</option>
                        <option value="low">Low Stock</option>
                        <option value="out">Out of Stock</option>
                    </select>
                </div>

                <!-- Inventory Grid -->
                <div class="inventory-grid" id="inventoryGrid">
                    <!-- Items will be loaded here -->
                </div>
            </section>

            <!-- Transactions Section -->
            <section id="transactions" class="content-section" style="display: none;">
                <header class="content-header">
                    <h1>Transaction History</h1>
                </header>
                <div class="transactions-list" id="transactionsList">
                    <!-- Transactions will be loaded here -->
                </div>
            </section>

            <!-- Reports Section -->
            <section id="reports" class="content-section" style="display: none;">
                <header class="content-header">
                    <h1>Reports</h1>
                </header>
                <div class="reports-container">
                    <!-- Reports content will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Add/Edit Item Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add New Item</h2>
            <form id="itemForm" onsubmit="handleItemSubmit(event)">
                <!-- Image Upload -->
                <div class="form-group">
                    <label>Item Image</label>
                    <div class="image-upload-container">
                        <img id="imagePreview" src="placeholder.png" alt="Item Preview">
                        <input type="file" id="itemImage" accept="image/*" onchange="handleFileUpload(event)">
                        <label for="itemImage" class="upload-button">
                            <i class="fas fa-upload"></i> Choose Image
                        </label>
                    </div>
                </div>

                <!-- Item Details -->
                <div class="form-group">
                    <label for="itemName">Item Name</label>
                    <input type="text" id="itemName" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="itemQuantity">Quantity</label>
                        <input type="number" id="itemQuantity" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="itemPrice">Price ($)</label>
                        <input type="number" id="itemPrice" step="0.01" min="0" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Save Item</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
