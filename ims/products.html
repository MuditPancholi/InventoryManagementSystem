<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - IMS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="initializeProducts()">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="user-info">
                <h3 id="userFullName"></h3>
                <p id="userRole"></p>
            </div>
            <nav class="nav-menu" id="roleBasedMenu">
                <!-- Menu will be populated based on role -->
            </nav>
        </aside>
        
        <main class="dashboard-content">
            <header class="content-header">
                <h1>Products Management</h1>
                <button class="btn btn-primary" data-permission="manage_inventory" onclick="openAddProductModal()">
                    <i class="fas fa-plus"></i> Add Product
                </button>
            </header>
            
            <div class="filters-section">
                <input type="text" id="searchProduct" placeholder="Search products..." class="search-input">
                <select id="categoryFilter" class="filter-select">
                    <option value="">All Categories</option>
                    <!-- Categories will be populated dynamically -->
                </select>
                <select id="stockFilter" class="filter-select">
                    <option value="">All Stock Levels</option>
                    <option value="low">Low Stock</option>
                    <option value="out">Out of Stock</option>
                    <option value="available">In Stock</option>
                </select>
            </div>

            <div class="table-container">
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>Product ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Stock</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <!-- Products will be populated dynamically -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Add Product</h2>
            <form id="productForm" onsubmit="handleProductSubmit(event)">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label for="productCategory">Category</label>
                    <select id="productCategory" required>
                        <!-- Categories will be populated dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="productStock">Stock Quantity</label>
                    <input type="number" id="productStock" required>
                </div>
                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save Product</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Products page specific JavaScript
        function initializeProducts() {
            const session = validateSession();
            if (!session) return;

            // Populate role-based menu
            populateMenu(session.role);
            
            // Load products
            loadProducts();
            
            // Initialize event listeners
            document.getElementById('searchProduct').addEventListener('input', filterProducts);
            document.getElementById('categoryFilter').addEventListener('change', filterProducts);
            document.getElementById('stockFilter').addEventListener('change', filterProducts);
        }

        function loadProducts() {
            // Simulated products data
            const products = [
                { id: 1, name: "Product 1", category: "Electronics", stock: 50, price: 99.99, status: "In Stock" },
                { id: 2, name: "Product 2", category: "Furniture", stock: 5, price: 199.99, status: "Low Stock" },
                // Add more products...
            ];

            const tableBody = document.getElementById('productsTableBody');
            tableBody.innerHTML = products.map(product => `
                <tr>
                    <td>${product.id}</td>
                    <td>${product.name}</td>
                    <td>${product.category}</td>
                    <td>${product.stock}</td>
                    <td>$${product.price}</td>
                    <td><span class="status ${getStatusClass(product.status)}">${product.status}</span></td>
                    <td>
                        <button class="btn-icon" onclick="editProduct(${product.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn-icon" onclick="deleteProduct(${product.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            switch(status.toLowerCase()) {
                case 'in stock': return 'status-success';
                case 'low stock': return 'status-warning';
                case 'out of stock': return 'status-danger';
                default: return '';
            }
        }

        // Add more functions for handling products...
    </script>
</body>
</html>
